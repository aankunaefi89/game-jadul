<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Jadul Aankunaefi</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f4f8;
            color: #333;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px 10px;
            box-sizing: border-box;
            touch-action: pan-y;
            user-select: none;
            -webkit-user-select: none;
        }

        .welcome-banner {
            width: 95%;
            max-width: 800px;
            background-color: #cfe2f3;
            border: 2px solid #6fa8dc;
            border-radius: 15px;
            padding: 15px 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .welcome-banner h1 {
            margin: 0;
            font-size: 24px;
            color: #0b5394;
            letter-spacing: 1px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin-bottom: 30px;
        }
        .game-btn {
            background-color: #3d85c6;
            color: white;
            border: 2px solid #0b5394;
            border-radius: 15px;
            padding: 18px 10px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px #0b5394;
            transition: all 0.1s ease;
            text-transform: uppercase;
        }
        .game-btn:active {
            box-shadow: 0 1px #0b5394;
            transform: translateY(4px);
        }

        .support-info {
            width: 90%;
            max-width: 500px;
            font-size: 15px;
            color: #555;
            margin-top: 10px;
            text-align: center;
        }
        .wallet-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
            flex-wrap: wrap;
        }
        .wallet-logo {
            height: 22px; 
            object-fit: contain;
        }
        .account-number {
            font-size: 18px;
            font-weight: 800;
            color: #222;
            background: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #ddd;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }

        .txt-ovo { font-weight: 900; color: #4d2a86; font-size: 18px; letter-spacing: -0.5px; }
        .txt-dana { font-weight: 900; color: #108ee9; font-size: 18px; letter-spacing: -0.5px; }

        .footer-credit {
            margin-top: 25px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 0.5px;
            color: #444;
        }
        .animated-name {
            display: inline-block;
            font-weight: 800;
            font-size: 18px;
            text-decoration: none;
            background: linear-gradient(270deg, #ff007f, #007bff, #ff007f);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 3s linear infinite, gentleBlink 1.5s ease-in-out infinite alternate;
        }

        @keyframes moveGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        @keyframes gentleBlink {
            0% { opacity: 1; filter: drop-shadow(0 0 2px rgba(0,123,255,0.4)); }
            100% { opacity: 0.7; filter: drop-shadow(0 0 8px rgba(255,0,127,0.8)); }
        }

        .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }

        .game-container-layout {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 780px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .leaderboard-box {
            width: 260px;
            background: #fff;
            border: 2px solid #0b5394;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
            min-height: 400px;
        }
        .leaderboard-box h3 { margin: 0 0 15px 0; text-align: center; color: #0b5394; font-size: 16px; border-bottom: 2px solid #cfe2f3; padding-bottom: 5px;}
        .score-list { list-style: none; padding: 0; margin: 0; }
        .score-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #ccc;
            font-size: 14px;
        }
        .score-item:last-child { border-bottom: none; }

        #game-arena {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #222;
            padding: 12px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

        .back-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #cc0000;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            box-shadow: 0 4px #990000;
            margin-bottom: 30px;
        }

        .input-box-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 0;
            background: #333;
            padding: 12px;
            border-radius: 8px;
            width: 90%;
            box-sizing: border-box;
            border: 1px solid #555;
        }
        .input-box-area input {
            padding: 8px;
            width: 85%;
            border-radius: 4px;
            border: 1px solid #ccc;
            margin-bottom: 8px;
            text-align: center;
            font-weight: bold;
        }
        .input-box-area button {
            padding: 8px 16px;
            background: #ffc107;
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 4px;
            width: 85%;
        }

        @media (max-width: 600px) {
            .game-container-layout {
                flex-direction: column;
                align-items: center;
            }
            .leaderboard-box {
                width: 330px;
                min-height: auto;
            }
        }
    </style>
</head>
<body>

    <!-- ================= SCREEN 1: HALAMAN UTAMA ================= -->
    <div id="main-menu" class="screen active">
        <div class="welcome-banner">
            <h1>WELLCOME TO GAME JADUL</h1>
        </div>

        <div class="game-grid">
            <button class="game-btn" onclick="openGame('snake')">Snake</button>
            <button class="game-btn" onclick="openGame('pacman')">Pac Man</button>
            <button class="game-btn" onclick="openGame('tetris')">Tetris</button>
            <button class="game-btn" onclick="openGame('pesawat')">Pesawat</button>
        </div>

        <div class="support-info">
            <p style="margin: 5px 0;">Support seikhlasnya pengembangan game</p>
            
            <div class="wallet-container">
                <img class="wallet-logo" src="https://cdn.jsdelivr.net/gh/rokhimin/rokhimin.github.io/assets/images/logo-ovo.png" onerror="this.style.display='none'; document.getElementById('alt-ovo').style.display='inline'" alt="OVO">
                <span id="alt-ovo" class="txt-ovo" style="display:none;">OVO</span>
                
                <span style="font-weight: bold; color: #bbb;">/</span>
                
                <img class="wallet-logo" src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" onerror="this.style.display='none'; document.getElementById('alt-dana').style.display='inline'" alt="DANA">
                <span id="alt-dana" class="txt-dana" style="display:none;">DANA</span>
                
                <span class="account-number">085693344161</span>
            </div>
            
            <div class="footer-credit">
                Created by : <span class="animated-name">Aankunaefi</span>
            </div>
        </div>
    </div>

    <!-- ================= SCREEN 2: GAME ARENA ================= -->
    <div id="game-screen" class="screen">
        <h2 id="active-game-title" style="color: #0b5394; margin-bottom: 5px;">GAME</h2>
        
        <div class="game-container-layout">
            
            <!-- ARENA PERMAINAN -->
            <div id="game-arena">
                <div id="canvas-placeholder" style="width:330px; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                    Memuat Permainan...
                </div>
            </div>

            <!-- PAPAN SKOR KIRI -->
            <div class="leaderboard-box">
                <h3 id="leaderboard-title">🏆 TOP 10 SKOR</h3>
                <ul id="score-list" class="score-list">
                    <li class="score-item"><span>Menghubungkan...</span></li>
                </ul>
            </div>

        </div>

        <button class="back-btn" onclick="backToMenu()">◀ Kembali ke Menu Utama</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            databaseURL: "https://tabungankeluarga-a091f-default-rtdb.firebaseio.com/"
        };
        
        let database = null;
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
        } catch(e) { console.log(e); }

        let currentGame = "";
        let globalScore = 0;
        let globalLevel = 1;

        // --- WEB AUDIO API AUDIO MANAGER ---
        let audioCtx = null;
        let bgmInterval = null;
        let isBgmPlaying = false;
        let bgmEnabled = true;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playEatSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = "square";
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.setValueAtTime(900, audioCtx.currentTime + 0.08); 
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function playHitSound() {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = "sawtooth";
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
        }

        function startBgm() {
            if (!bgmEnabled || isBgmPlaying || !audioCtx) return;
            isBgmPlaying = true;
            let notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5 Arpeggio Retro
            let step = 0;
            
            bgmInterval = setInterval(() => {
                if (!isBgmPlaying || audioCtx.state === 'suspended') return;
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = "triangle"; 
                osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
                step++;
            }, 250); 
        }

        function stopBgm() {
            isBgmPlaying = false;
            if (bgmInterval) {
                clearInterval(bgmInterval);
                bgmInterval = null;
            }
        }

        function toggleBgmToggle() {
            bgmEnabled = !bgmEnabled;
            const btn = document.getElementById("btn-bgm-toggle");
            if (bgmEnabled) {
                btn.innerText = "🎵 BGM: ON";
                btn.style.background = "#27ae60";
                initAudio();
                startBgm();
            } else {
                btn.innerText = "🔇 BGM: OFF";
                btn.style.background = "#7f8c8d";
                stopBgm();
            }
        }

        function openGame(gameName) {
            currentGame = gameName;
            document.getElementById("main-menu").classList.remove("active");
            document.getElementById("game-screen").classList.add("active");
            
            document.getElementById("active-game-title").innerText = `${gameName.toUpperCase()} - AANKUNAEFI`;
            document.getElementById("leaderboard-title").innerText = `🏆 TOP 10 RANK ${gameName.toUpperCase()}`;

            loadLeaderboard(gameName);

            if (gameName === 'snake') {
                loadSnakeGame();
            } else {
                document.getElementById("canvas-placeholder").innerHTML = `<h3 style='color:#fff;'>Game ${gameName.toUpperCase()} sedang dikembangkan!</h3>`;
            }
        }

        function backToMenu() {
            stopBgm();
            if (typeof clearIntervalsAll === "function") clearIntervalsAll();
            document.getElementById("game-screen").classList.remove("active");
            document.getElementById("main-menu").classList.add("active");
            document.getElementById("canvas-placeholder").innerHTML = "Memuat Permainan...";
        }

        function loadLeaderboard(gameName) {
            const scoreListUl = document.getElementById("score-list");
            if(database) {
                database.ref('leaderboard/' + gameName).orderByChild('score').limitToLast(10).on('value', (snapshot) => {
                    scoreListUl.innerHTML = "";
                    let scores = [];
                    snapshot.forEach((childSnapshot) => { scores.push(childSnapshot.val()); });
                    scores.reverse();
                    
                    while(scores.length < 10) {
                        scores.push({name: "-", score: "-", level: "-"});
                    }
                    
                    scoreListUl.innerHTML = "";
                    scores.forEach((item, index) => {
                        const li = document.createElement("li");
                        li.className = "score-item";
                        let scoreDisplay = item.score !== "-" ? `${item.score} (L${item.level})` : "-";
                        li.innerHTML = `<span><b>${index + 1}.</b> ${item.name}</span> <span style="font-weight:bold; color:#0b5394;">${scoreDisplay}</span>`;
                        scoreListUl.appendChild(li);
                    });
                });
            }
        }

        function submitScore() {
            const nameInput = document.getElementById("player-name-input");
            const name = nameInput.value.trim();
            if (name === "") return;

            if(database) {
                database.ref('leaderboard/' + currentGame).push({
                    name: name,
                    score: parseInt(globalScore),
                    level: parseInt(globalLevel),
                    timestamp: Date.now()
                });
            }
            document.getElementById("input-score-area").style.display = "none";
            nameInput.value = "";
        }

        let currentInterval;
        function clearIntervalsAll() { if (currentInterval) clearInterval(currentInterval); }

        function loadSnakeGame() {
            const placeholder = document.getElementById("canvas-placeholder");
            placeholder.innerHTML = `
                <div id="touch-zone" style="position:relative; width:330px; height:330px; display:flex; justify-content:center; align-items:center;">
                    <canvas id="snakeCanvas" width="330" height="330" style="background:#111; border:2px solid #555; display:block;"></canvas>
                    
                    <div id="snake-overlay" style="position:absolute; top:0; left:0; width:330px; height:330px; background:rgba(0,0,0,0.9); display:none; flex-direction:column; align-items:center; justify-content:center; color:#fff; padding:10px; box-sizing:border-box;">
                        <h2 style="color:#ff4444; margin:5px 0; font-size:26px;">GAME OVER</h2>
                        <p style="margin:5px 0; font-size:16px;">Skor: <span id="snake-final-score" style="color:lime; font-weight:bold;">0</span></p>
                        
                        <div id="input-score-area" class="input-box-area">
                            <input type="text" id="player-name-input" placeholder="Nama Kamu" maxlength="12">
                            <button onclick="submitScore()">KIRIM SKOR</button>
                        </div>
                        <button onclick="startSnake()" style="margin-top:5px; padding:10px; font-weight:bold; background:lime; border:none; border-radius:5px; width:85%; cursor:pointer;">MAIN LAGI ↻</button>
                    </div>
                </div>
                
                <div style="color:#fff; width:330px; display:flex; justify-content:space-between; margin-top:8px; font-size:13px; align-items:center;">
                    <span>❤️ Nyawa: <b id="snk-lives">3</b></span>
                    <span>⭐ Lvl: <b id="snk-level">1</b></span>
                    <span>🎯 Skor: <b id="snk-score">0</b></span>
                    <button id="btn-bgm-toggle" onclick="toggleBgmToggle()" style="background:#27ae60; color:#fff; border:none; border-radius:4px; padding:3px 8px; font-weight:bold; cursor:pointer; font-size:11px;">🎵 BGM: ON</button>
                </div>

                <!-- Indikator Batas Durasi Makanan Emas -->
                <div id="food-timer-bar" style="width: 330px; height: 6px; background: #ffcc00; margin-top: 5px; display: none; transition: width 0.1s linear; border-radius:3px;"></div>

                <div style="color:#aaa; font-size:11px; margin-top:6px; font-style:italic; text-align:center;">
                    🍎 Merah (+10) | 👑 Emas (+50, Cepat Hilang!) | 🌀 Biru (Rem/Perlambat)
                </div>
                
                <div style="display:grid; grid-template-columns: repeat(3, 65px); grid-template-rows: repeat(3, 48px); gap:10px; margin-top:10px; justify-content:center; width:330px;">
                    <div></div><button id="btn-up" style="background:#444; color:#fff; border:1px solid #666; border-radius:8px; font-size:22px; font-weight:bold;">▲</button><div></div>
                    <button id="btn-left" style="background:#444; color:#fff; border:1px solid #666; border-radius:8px; font-size:22px; font-weight:bold;">◀</button><div></div><button id="btn-right" style="background:#444; color:#fff; border:1px solid #666; border-radius:8px; font-size:22px; font-weight:bold;">▶</button>
                    <div></div><button id="btn-down" style="background:#444; color:#fff; border:1px solid #666; border-radius:8px; font-size:22px; font-weight:bold;">▼</button><div></div>
                </div>
            `;
            initSnakeLogic();
        }

        function initSnakeLogic() {
            const canvas = document.getElementById("snakeCanvas");
            if(!canvas) return;
            const ctx = canvas.getContext("2d");
            
            const gridSize = 15;
            let snake, food, score, level, lives, dx, dy, isGameOver, speed;
            let foodTimer = null;
            let foodTimeLeft = 0;
            let obstacles = []; // Menyimpan koordinat rintangan level aktif
            const defaultSpeed = 130;

            // --- FUNGSI PEMBUAT RINTANGAN SESUAI LEVEL ---
            function generateObstacles(lvl) {
                obstacles = [];
                let mid = 11 * gridSize; // Posisi tengah canvas (330 / 15 = 22 blok, tengahnya 11)

                if (lvl === 3 || lvl === 4) {
                    // Level 3-4: Rintangan berbentuk tanda tambah (+) di tengah
                    for(let i = -3; i <= 3; i++) {
                        obstacles.push({ x: mid + (i * gridSize), y: mid });
                        if(i !== 0) obstacles.push({ x: mid, y: mid + (i * gridSize) });
                    }
                } else if (lvl >= 5) {
                    // Level 5+: Desain Labirin Sederhana (4 Tembok Siku di Sudut Dalam)
                    for (let i = 4; i <= 8; i++) {
                        // Kiri atas
                        obstacles.push({ x: i * gridSize, y: 5 * gridSize });
                        obstacles.push({ x: 5 * gridSize, y: i * gridSize });
                        // Kanan atas
                        obstacles.push({ x: (22 - i) * gridSize, y: 5 * gridSize });
                        obstacles.push({ x: 17 * gridSize, y: i * gridSize });
                        // Kiri bawah
                        obstacles.push({ x: i * gridSize, y: 17 * gridSize });
                        obstacles.push({ x: 5 * gridSize, y: (22 - i) * gridSize });
                        // Kanan bawah
                        obstacles.push({ x: (22 - i) * gridSize, y: 17 * gridSize });
                        obstacles.push({ x: 17 * gridSize, y: (22 - i) * gridSize });
                    }
                }
            }

            window.startSnake = function() {
                initAudio();
                // Spawn awal ular digeser sedikit agar aman dari rintangan tengah level 3
                snake = [{ x: 45, y: 45 }, { x: 30, y: 45 }, { x: 15, y: 45 }];
                food = { x: 0, y: 0, type: 'normal' }; 
                score = 0; level = 1; lives = 3; dx = gridSize; dy = 0;
                isGameOver = false; speed = defaultSpeed;
                
                if (foodTimer) clearInterval(foodTimer);
                document.getElementById("snake-overlay").style.display = "none";
                document.getElementById("food-timer-bar").style.display = "none";
                
                generateObstacles(level);
                updateStats();
                generateFood();
                
                clearIntervalsAll();
                currentInterval = setInterval(gameLoop, speed);
                
                stopBgm();
                startBgm();
            };

            function updateStats() {
                document.getElementById("snk-lives").innerText = lives;
                document.getElementById("snk-level").innerText = level;
                document.getElementById("snk-score").innerText = score;
            }

            function generateFood() {
                if (foodTimer) clearInterval(foodTimer);
                document.getElementById("food-timer-bar").style.display = "none";

                let validPosition = false;
                while (!validPosition) {
                    food.x = Math.floor(Math.random() * (canvas.width / gridSize)) * gridSize;
                    food.y = Math.floor(Math.random() * (canvas.height / gridSize)) * gridSize;
                    
                    // Cek jangan sampai spawn di badan ular
                    let onSnake = snake.some(part => part.x === food.x && part.y === food.y);
                    // Cek jangan sampai spawn di atas rintangan/tembok
                    let onObstacle = obstacles.some(obs => obs.x === food.x && obs.y === food.y);

                    if (!onSnake && !onObstacle) {
                        validPosition = true;
                    }
                }

                let rand = Math.random();
                if (rand < 0.15) { 
                    food.type = 'gold'; 
                    startFoodCountdown();
                } else if (rand < 0.28) { 
                    food.type = 'slow'; 
                } else {
                    food.type = 'normal'; 
                }
            }

            function startFoodCountdown() {
                foodTimeLeft = 60; 
                const timerBar = document.getElementById("food-timer-bar");
                timerBar.style.display = "block";
                timerBar.style.width = "330px";

                foodTimer = setInterval(() => {
                    if (isGameOver) { clearInterval(foodTimer); return; }
                    foodTimeLeft--;
                    timerBar.style.width = `${(foodTimeLeft / 60) * 330}px`;

                    if (foodTimeLeft <= 0) {
                        clearInterval(foodTimer);
                        generateFood();
                    }
                }, 100);
            }

            window.moveSnk = function(targetKey) {
                initAudio(); // Untuk mengaktifkan audio konteks via interaksi user jika browser memblokir awal
                if (isGameOver) return;
                if (targetKey === "ArrowLeft" && dx === 0) { dx = -gridSize; dy = 0; }
                if (targetKey === "ArrowUp" && dy === 0) { dx = 0; dy = -gridSize; }
                if (targetKey === "ArrowRight" && dx === 0) { dx = gridSize; dy = 0; }
                if (targetKey === "ArrowDown" && dy === 0) { dx = 0; dy = gridSize; }
            };

            document.onkeydown = function(e) { window.moveSnk(e.key); };

            document.getElementById("btn-up").addEventListener("touchstart", (e) => { e.preventDefault(); window.moveSnk('ArrowUp'); });
            document.getElementById("btn-down").addEventListener("touchstart", (e) => { e.preventDefault(); window.moveSnk('ArrowDown'); });
            document.getElementById("btn-left").addEventListener("touchstart", (e) => { e.preventDefault(); window.moveSnk('ArrowLeft'); });
            document.getElementById("btn-right").addEventListener("touchstart", (e) => { e.preventDefault(); window.moveSnk('ArrowRight'); });

            let touchZone = document.getElementById("touch-zone");
            let startX = 0, startY = 0;

            touchZone.addEventListener("touchstart", function(e) {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
            }, { passive: true });

            touchZone.addEventListener("touchmove", function(e) {
                if (isGameOver || !startX || !startY) return;

                let diffX = e.touches[0].clientX - startX;
                let diffY = e.touches[0].clientY - startY;
                
                if (Math.abs(diffX) > 15 || Math.abs(diffY) > 15) {
                    e.preventDefault(); 
                    
                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        if (diffX > 0) window.moveSnk('ArrowRight');
                        else window.moveSnk('ArrowLeft');
                    } else {
                        if (diffY > 0) window.moveSnk('ArrowDown');
                        else window.moveSnk('ArrowUp');
                    }
                    startX = 0; startY = 0;
                }
            }, { passive: false });

            function gameLoop() {
                if (isGameOver) return;
                const head = { x: snake[0].x + dx, y: snake[0].y + dy };
                
                // Deteksi Tabrakan Dinding Luar
                let hitWall = head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height;
                
                // Deteksi Tabrakan Badan Sendiri
                let hitSelf = false;
                for (let i = 4; i < snake.length; i++) { if (snake[i].x === head.x && snake[i].y === head.y) hitSelf = true; }

                // Deteksi Tabrakan Rintangan Level (Obstacles)
                let hitObstacle = obstacles.some(obs => obs.x === head.x && obs.y === head.y);

                if (hitWall || hitSelf || hitObstacle) {
                    playHitSound(); // 🔊 Efek Suara Booom saat nabrak
                    lives--; 
                    updateStats();
                    if (foodTimer) clearInterval(foodTimer);
                    document.getElementById("food-timer-bar").style.display = "none";

                    if (lives > 0) {
                        // Reset posisi ular di area yang aman (pojok kiri atas)
                        snake = [{ x: 45, y: 45 }, { x: 30, y: 45 }, { x: 15, y: 45 }];
                        dx = gridSize; dy = 0; 
                        generateFood(); 
                        return;
                    } else {
                        isGameOver = true; 
                        clearIntervalsAll();
                        stopBgm(); // 🔇 Matikan musik saat kalah
                        globalScore = score; globalLevel = level;
                        document.getElementById("snake-final-score").innerText = score;
                        document.getElementById("input-score-area").style.display = "flex";
                        document.getElementById("snake-overlay").style.display = "flex";
                        return;
                    }
                }

                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    playEatSound(); // 🔊 Efek Suara Bip saat makan umpan
                    
                    if (food.type === 'gold') {
                        score += 50;
                    } else if (food.type === 'slow') {
                        score += 10;
                        speed = Math.min(speed + 25, defaultSpeed); 
                        clearIntervalsAll();
                        currentInterval = setInterval(gameLoop, speed);
                    } else {
                        score += 10;
                    }

                    let targetLevel = Math.floor(score / 200) + 1;
                    if (targetLevel > 10) targetLevel = 10;
                    if (targetLevel > level) {
                        level = targetLevel; 
                        lives += 1; 
                        speed = speed * 0.90; 
                        generateObstacles(level); // Perbarui bentuk rintangan saat naik level
                        clearIntervalsAll(); 
                        currentInterval = setInterval(gameLoop, speed);
                    }
                    updateStats(); generateFood();
                } else { snake.pop(); }

                // --- PROSES MENGGAMBAR ARENA & ELEMEN ---
                ctx.fillStyle = "#111"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // 1. Gambar Rintangan Tembok (jika ada)
                ctx.fillStyle = "#7f8c8d"; // Warna tembok abu-abu retro
                obstacles.forEach(obs => {
                    ctx.fillRect(obs.x + 1, obs.y + 1, gridSize - 2, gridSize - 2);
                    // Garis tepi bata biar lebih estetik
                    ctx.strokeStyle = "#bdc3c7";
                    ctx.strokeRect(obs.x + 1, obs.y + 1, gridSize - 2, gridSize - 2);
                });

                // 2. Gambar Ular
                snake.forEach((part, index) => {
                    ctx.fillStyle = (index === 0) ? "#00cc44" : ((index % 2 === 0) ? "#00aa33" : "#008822");
                    ctx.fillRect(part.x + 0.5, part.y + 0.5, gridSize - 1, gridSize - 1);
                });
                
                // 3. Gambar Umpan
                if (food.type === 'gold') {
                    ctx.fillStyle = "#ffcc00"; 
                    ctx.shadowColor = "#ffcc00";
                    ctx.shadowBlur = 6;
                } else if (food.type === 'slow') {
                    ctx.fillStyle = "#00e5ff"; 
                    ctx.shadowColor = "#00e5ff";
                    ctx.shadowBlur = 6;
                } else {
                    ctx.fillStyle = "#ff2222"; 
                    ctx.shadowBlur = 0;
                }
                
                ctx.beginPath(); ctx.arc(food.x + gridSize/2, food.y + gridSize/2, gridSize/2 - 1, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0; 
            }
            window.startSnake();
        }
    </script>
</body>
</html>
