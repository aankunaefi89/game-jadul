<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Jadul Aankunaefi</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background-color: #f0f4f8; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px 10px; box-sizing: border-box; touch-action: pan-y; user-select: none; -webkit-user-select: none; }
        .welcome-banner { width: 95%; max-width: 800px; background-color: #cfe2f3; border: 2px solid #6fa8dc; border-radius: 15px; padding: 15px 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .welcome-banner h1 { margin: 0; font-size: 24px; color: #0b5394; letter-spacing: 1px; }
        .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 90%; max-width: 500px; margin-bottom: 30px; }
        .game-btn { background-color: #3d85c6; color: white; border: 2px solid #0b5394; border-radius: 15px; padding: 18px 10px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 5px #0b5394; transition: all 0.1s ease; text-transform: uppercase; }
        .game-btn:active { box-shadow: 0 1px #0b5394; transform: translateY(4px); }
        .support-info { width: 90%; max-width: 500px; font-size: 15px; color: #555; margin-top: 10px; text-align: center; }
        .wallet-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 12px 0; flex-wrap: wrap; }
        .account-number { font-size: 18px; font-weight: 800; color: #222; background: #fff; padding: 4px 12px; border-radius: 20px; border: 1px solid #ddd; }
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        .game-container-layout { display: flex; flex-direction: row; align-items: flex-start; justify-content: center; gap: 20px; width: 100%; max-width: 780px; margin-top: 10px; box-sizing: border-box; }
        .leaderboard-box { width: 260px; background: #fff; border: 2px solid #0b5394; border-radius: 10px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); min-height: 400px; }
        #game-arena { display: flex; flex-direction: column; align-items: center; background: #222; padding: 12px; border-radius: 10px; }
        .back-btn { margin-top: 20px; padding: 12px 25px; background-color: #cc0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Chat Styling */
        .chat-container { width: 330px; height: 330px; display: flex; flex-direction: column; background: #fff; border: 2px solid #3d85c6; border-radius: 10px; overflow: hidden; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 14px; text-align: left; }
        .chat-input-area { display: flex; padding: 5px; gap: 5px; background: #eee; }
        @media (max-width: 600px) { .game-container-layout { flex-direction: column; align-items: center; } .leaderboard-box { width: 330px; min-height: auto; } }
    </style>
</head>
<body>

    <div id="main-menu" class="screen active">
        <div class="welcome-banner"><h1>WELCOME TO GAME JADUL</h1></div>
        <div class="game-grid">
            <button class="game-btn" onclick="openGame('snake')">Snake</button>
            <button class="game-btn" onclick="openGame('pacman')">Pac Man</button>
            <button class="game-btn" onclick="openGame('tetris')">Tetris</button>
            <button class="game-btn" onclick="openGame('pesawat')">Pesawat</button>
            <button class="game-btn" onclick="openGame('livechat')">Livechat</button>
        </div>
        <div class="support-info">
            <div class="wallet-container"><span class="account-number">085693344161</span></div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <h2 id="active-game-title" style="color: #0b5394;">GAME</h2>
        <div class="game-container-layout">
            <div id="game-arena">
                <div id="canvas-placeholder" style="width:330px; display:flex; flex-direction:column; align-items:center; justify-content:center;">Memuat...</div>
            </div>
            <div class="leaderboard-box">
                <h3 id="leaderboard-title">🏆 TOP 10 SKOR</h3>
                <ul id="score-list" style="list-style:none; padding:0;"></ul>
            </div>
        </div>
        <button class="back-btn" onclick="backToMenu()">◀ Kembali ke Menu Utama</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://tabungankeluarga-a091f-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function openGame(gameName) {
            document.getElementById("main-menu").classList.remove("active");
            document.getElementById("game-screen").classList.add("active");
            document.getElementById("active-game-title").innerText = `${gameName.toUpperCase()} - AANKUNAEFI`;
            
            if (gameName === 'livechat') {
                loadLiveChat();
            } else {
                document.getElementById("canvas-placeholder").innerHTML = `<h3 style='color:#fff;'>Game ${gameName.toUpperCase()} sedang dikembangkan!</h3>`;
            }
        }

        function loadLiveChat() {
            const placeholder = document.getElementById("canvas-placeholder");
            placeholder.innerHTML = `
                <div class="chat-container">
                    <div id="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-name" placeholder="Nama" style="width:30%">
                        <input type="text" id="chat-msg" placeholder="Pesan..." style="flex:1">
                        <button onclick="sendChatMessage()">Kirim</button>
                    </div>
                </div>
            `;
            database.ref('livechat').limitToLast(20).on('value', (snapshot) => {
                const msgDiv = document.getElementById("chat-messages");
                if (!msgDiv) return;
                msgDiv.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    msgDiv.innerHTML += `<div><b>${data.name || 'Anonim'}:</b> ${data.message}</div>`;
                });
                msgDiv.scrollTop = msgDiv.scrollHeight;
            });
        }

        function sendChatMessage() {
            const name = document.getElementById("chat-name").value || "Anonim";
            const msg = document.getElementById("chat-msg").value;
            if(!msg || msg.trim() === "") return;
            database.ref('livechat').push({ name: name, message: msg, timestamp: Date.now() });
            document.getElementById("chat-msg").value = "";
        }

        function backToMenu() {
            document.getElementById("game-screen").classList.remove("active");
            document.getElementById("main-menu").classList.add("active");
        }
    </script>
</body>
</html>
