<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Jadul Aankunaefi</title>
    <style>
        /* CSS yang sudah ada tetap dipertahankan */
        body { display: flex; flex-direction: column; align-items: center; background-color: #f0f4f8; color: #333; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 15px 10px; box-sizing: border-box; touch-action: pan-y; user-select: none; -webkit-user-select: none; }
        .welcome-banner { width: 95%; max-width: 800px; background-color: #cfe2f3; border: 2px solid #6fa8dc; border-radius: 15px; padding: 15px 10px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        /* ... (tambahkan style CSS chat & modal dari langkah sebelumnya di sini) ... */
        #admin-login-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; padding: 20px; border-radius: 10px; text-align: center; }
        #chat-container { width: 90%; max-width: 500px; margin: 20px auto; border: 1px solid #ccc; padding: 10px; background: white; }
        #chat-messages { height: 200px; overflow-y: scroll; margin-bottom: 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <!-- Main Menu & Game Screen (Konten existing Anda) -->
    
    <!-- Chat Section -->
    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-name" placeholder="Nama Anda">
        <input type="text" id="chat-input" placeholder="Pesan...">
        <button onclick="sendMessage()">Kirim</button>
    </div>

    <!-- Admin Login Modal -->
    <div id="admin-login-modal">
        <div class="modal-content">
            <h3>Login Admin</h3>
            <input type="password" id="admin-pass" placeholder="Masukkan Password">
            <button onclick="checkAdmin()">Login</button>
            <button onclick="document.getElementById('admin-login-modal').style.display='none'">Batal</button>
        </div>
    </div>
    <div onclick="document.getElementById('admin-login-modal').style.display='flex'" style="position:fixed; bottom:5px; right:5px; font-size:10px; color:#ccc; cursor:pointer;">Admin</div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://tabungankeluarga-a091f-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const ADMIN_PASSWORD = "PasswordAnda123";

        // Fungsi Admin
        function checkAdmin() {
            const pass = document.getElementById("admin-pass").value;
            if (pass === ADMIN_PASSWORD) {
                sessionStorage.setItem("isAdmin", "true");
                alert("Login Admin Berhasil!");
                document.getElementById('admin-login-modal').style.display = 'none';
                location.reload();
            } else { alert("Password Salah!"); }
        }

        // Fungsi Chat
        function sendMessage() {
            const nameInput = document.getElementById("chat-name");
            const msgInput = document.getElementById("chat-input");
            if (!msgInput.value.trim()) return;
            database.ref('chat_messages').push({
                name: nameInput.value.trim() || "Anonim",
                message: msgInput.value.trim(),
                timestamp: Date.now()
            });
            msgInput.value = "";
        }

        database.ref('chat_messages').orderByChild('timestamp').on('value', (snapshot) => {
            const chatDiv = document.getElementById("chat-messages");
            chatDiv.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                const div = document.createElement("div");
                let deleteBtn = sessionStorage.getItem("isAdmin") === "true" ? 
                    `<button onclick="deleteMsg('${child.key}')" style="background:red; color:white; border:none; cursor:pointer; margin-left:10px;">Hapus</button>` : "";
                div.innerHTML = `<b>${data.name}:</b> ${data.message} ${deleteBtn}`;
                chatDiv.appendChild(div);
            });
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });

        function deleteMsg(key) {
            if (confirm("Hapus pesan ini?")) database.ref('chat_messages/' + key).remove();
        }

        // ... (Fungsi Game existing Anda lainnya) ...
    </script>
</body>
</html>
